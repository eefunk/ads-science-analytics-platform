name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=src \
            --cov=data \
            --cov-report=term-missing \
            --cov-report=xml \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install linters
        run: pip install ruff black
      - name: Run Ruff
        run: ruff check src/ data/ tests/
      - name: Check formatting
        run: black --check src/ data/ tests/

  pipeline-smoke-test:
    name: Pipeline smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Generate data and run pipeline
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from data.generators.auction_data_generator import generate_all
          from src.etl.pipeline import AdsPipeline
          datasets = generate_all(n_advertisers=20, n_auctions=1000, n_supply=500, days=7)
          pipeline = AdsPipeline(data_dir='data/sample', db_path='/tmp/smoke_test.db', verbose=True)
          pipeline.run(datasets=datasets)
          summary = pipeline.warehouse_summary()
          print(summary.to_string(index=False))
          assert len(summary) >= 4, 'Expected at least 4 tables in DW'
          print('Smoke test PASSED')
          "
